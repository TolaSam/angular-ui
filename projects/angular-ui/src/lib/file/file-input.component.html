<label bao-label [required]="required" [for]="inputId" [id]="inputId+'-label'">{{ label }}</label>
<ng-content select="bao-guiding-text"></ng-content>
<div
  baoFileDrop
  class="file-drop-zone"
  (fileDrop)="uploadFile($event)"
  #dropzone
>
  <button
    bao-button
    [attr.aria-labelledby]="inputId+'-label'"
    type="button"
    displayType="utility"
    level="secondary"
    [disabled]="disabled"
    (click)="uploader.click()"
  >
    <span>{{ intl.dropzoneButtonLabel }}</span>
  </button>
  <input
    [id]="inputId"
    type="file"
    [disabled]="disabled"
    (change)="uploadFile($event.target.files[0])"
    #uploader
  />
  <ng-container
    ><div #ref>
      <ng-content select="bao-file-dropzone-instructions"></ng-content></div
  ></ng-container>
  @if (ref.childNodes.length === 0) {
    <bao-file-dropzone-instructions>{{
      intl.defaultDropzoneInstructions
    }}</bao-file-dropzone-instructions>
  }
</div>
@if (isFileTooBig) {
  <bao-error>
    {{ intl.fileTooBigErrorMessage }}
  </bao-error>
}
@if (isFileTypeInvalid) {
  <bao-error>
    {{ intl.invalidFileTypeErrorMessage }}
  </bao-error>
}
<ng-content select="bao-error"></ng-content>
<ng-content></ng-content>
